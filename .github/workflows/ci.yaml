name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
        with:
          github_access_token: ${{ github.token }}
          extra_nix_config: |
            accept-flake-config = true

      - name: Configure cachix
        uses: cachix/cachix-action@1eb2ef646ac0255473d23a5907ad7b04ce94065c # v17
        with:
          name: devenv

      - name: Install devenv
        shell: bash
        run: nix profile add github:cachix/devenv/latest#devenv

      - name: Run flake checks
        run: nix flake check

  example:
    name: Example
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
        with:
          github_access_token: ${{ github.token }}
          extra_nix_config: |
            accept-flake-config = true

      - name: Configure cachix
        uses: cachix/cachix-action@1eb2ef646ac0255473d23a5907ad7b04ce94065c # v17
        with:
          name: devenv

      - name: Install devenv
        shell: bash
        run: nix profile add github:cachix/devenv/latest#devenv

      - name: Build example shell
        working-directory: examples/default
        run: devenv build shell

  example-project-local:
    name: Example (project-local)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
        with:
          github_access_token: ${{ github.token }}
          extra_nix_config: |
            accept-flake-config = true

      - name: Configure cachix
        uses: cachix/cachix-action@1eb2ef646ac0255473d23a5907ad7b04ce94065c # v17
        with:
          name: devenv

      - name: Install devenv
        shell: bash
        run: nix profile add github:cachix/devenv/latest#devenv

      - name: Build example shell
        working-directory: examples/project-local
        run: devenv build shell

      - name: Smoke-test env vars
        working-directory: examples/project-local
        run: |
          devenv shell -- bash -c '
            set -euo pipefail
            declare -A expected=(
              [CLAUDE_CONFIG_DIR]="$PWD/.devenv/state/agents/claude"
              [CODEX_HOME]="$PWD/.devenv/state/agents/codex"
              [GEMINI_CLI_HOME]="$PWD/.devenv/state/agents/gemini"
            )
            for var in "${!expected[@]}"; do
              val="${!var}"
              want="${expected[$var]}"
              [ -n "$val" ] || { echo "$var not set"; exit 1; }
              [ "$val" = "$want" ] || { echo "$var: want $want, got $val"; exit 1; }
              [ -d "$val" ] || { echo "$var directory missing: $val"; exit 1; }
            done
            echo "all env vars set to expected paths and directories exist"
          '

  example-project-local-unsupported:
    name: Example (project-local, unsupported agent)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
        with:
          github_access_token: ${{ github.token }}
          extra_nix_config: |
            accept-flake-config = true

      - name: Configure cachix
        uses: cachix/cachix-action@1eb2ef646ac0255473d23a5907ad7b04ce94065c # v17
        with:
          name: devenv

      - name: Install devenv
        shell: bash
        run: nix profile add github:cachix/devenv/latest#devenv

      - name: Assert build fails with expected assertion message
        working-directory: examples/project-local-unsupported
        shell: bash
        run: |
          set +e
          output=$(devenv build shell 2>&1)
          rc=$?
          set -e
          if [ $rc -eq 0 ]; then
            echo "ERROR: expected 'devenv build shell' to fail, but it succeeded"
            echo "--- output ---"
            echo "$output"
            exit 1
          fi
          if ! echo "$output" | grep -qF "projectLocal = true is not yet supported"; then
            echo "ERROR: expected assertion message not found in output"
            echo "--- output ---"
            echo "$output"
            exit 1
          fi
          echo "build failed as expected with correct assertion message"
